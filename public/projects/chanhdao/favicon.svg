<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <defs>
    <style>
      .wheel { fill: none; stroke: #D4A843; }
      .filled { fill: #D4A843; stroke: none; }
    </style>
  </defs>

  <!-- Outer rim -->
  <circle cx="75" cy="75" r="68" class="wheel" stroke-width="6"/>

  <!-- Inner rim -->
  <circle cx="75" cy="75" r="28" class="wheel" stroke-width="4"/>

  <!-- 8 continuous spokes: from hub edge straight through to outer rim -->
  <!-- Spoke 0° (top) -->
  <line x1="75" y1="63" x2="75" y2="7" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 45° -->
  <line x1="83.49" y1="66.51" x2="123.03" y2="26.97" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 90° (right) -->
  <line x1="87" y1="75" x2="143" y2="75" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 135° -->
  <line x1="83.49" y1="83.49" x2="123.03" y2="123.03" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 180° (bottom) -->
  <line x1="75" y1="87" x2="75" y2="143" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 225° -->
  <line x1="66.51" y1="83.49" x2="26.97" y2="123.03" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 270° (left) -->
  <line x1="63" y1="75" x2="7" y2="75" class="wheel" stroke-width="5" stroke-linecap="round"/>
  <!-- Spoke 315° -->
  <line x1="66.51" y1="66.51" x2="26.97" y2="26.97" class="wheel" stroke-width="5" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="75" cy="75" r="12" class="filled"/>
  <circle cx="75" cy="75" r="5" fill="#1a1a2e" stroke="none"/>

  <!-- Decorative circles at spoke-rim junctions -->
  <circle cx="75" cy="7" r="3.5" class="filled"/>
  <circle cx="123.03" cy="26.97" r="3.5" class="filled"/>
  <circle cx="143" cy="75" r="3.5" class="filled"/>
  <circle cx="123.03" cy="123.03" r="3.5" class="filled"/>
  <circle cx="75" cy="143" r="3.5" class="filled"/>
  <circle cx="26.97" cy="123.03" r="3.5" class="filled"/>
  <circle cx="7" cy="75" r="3.5" class="filled"/>
  <circle cx="26.97" cy="26.97" r="3.5" class="filled"/>
</svg>
