<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1207"/>
      <stop offset="100%" stop-color="#2d1f0e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle pattern dots -->
  <g opacity="0.06">
    <circle cx="100" cy="80" r="60" fill="#D4A843"/>
    <circle cx="700" cy="370" r="80" fill="#D4A843"/>
    <circle cx="650" cy="100" r="40" fill="#D4A843"/>
  </g>

  <!-- Dharma Wheel (centered, larger) -->
  <g transform="translate(400, 200)" opacity="0.12">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#D4A843" stroke-width="5"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#D4A843" stroke-width="3"/>
    <line x1="0" y1="-55" x2="0" y2="-140" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="39" y1="-39" x2="99" y2="-99" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="55" y1="0" x2="140" y2="0" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="39" y1="39" x2="99" y2="99" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="55" x2="0" y2="140" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="-39" y1="39" x2="-99" y2="99" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="-55" y1="0" x2="-140" y2="0" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
    <line x1="-39" y1="-39" x2="-99" y2="-99" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Vietnamese text / branding -->
  <text x="400" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#D4A843">Chánh Đạo</text>
  <text x="400" y="215" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#D4A843" opacity="0.7">chanhdao.vn</text>

  <!-- Tagline -->
  <text x="400" y="260" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#e0d5c0" opacity="0.6">AI-Powered Buddhist Learning Platform</text>

  <!-- Stats bar -->
  <g transform="translate(200, 300)">
    <rect x="0" y="0" width="400" height="50" rx="12" fill="rgba(212,168,67,0.08)" stroke="rgba(212,168,67,0.2)" stroke-width="1"/>
    <text x="70" y="22" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#D4A843">162</text>
    <text x="70" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#e0d5c0" opacity="0.5">Lessons</text>
    <line x1="133" y1="8" x2="133" y2="42" stroke="rgba(212,168,67,0.2)" stroke-width="1"/>
    <text x="200" y="22" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#D4A843">AI</text>
    <text x="200" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#e0d5c0" opacity="0.5">Q&amp;A</text>
    <line x1="266" y1="8" x2="266" y2="42" stroke="rgba(212,168,67,0.2)" stroke-width="1"/>
    <text x="333" y="22" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#D4A843">K8s</text>
    <text x="333" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#e0d5c0" opacity="0.5">Self-hosted</text>
  </g>

  <!-- Open source badge -->
  <rect x="320" y="370" width="160" height="28" rx="14" fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <text x="400" y="389" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#D4A843">Open Source · Non-Profit</text>
</svg>